services:
  - type: web
    name: document-management-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Set these in Render dashboard → Environment tab:
      # FIREBASE_SERVICE_ACCOUNT_PATH
      # GMAIL_USER
      # GMAIL_APP_PASSWORD
      # EMAIL_FROM_NAME
      # EMAIL_FROM_ADDRESS
      # API_SECRET_KEY
      # ALLOWED_ORIGINS
      # SIGNING_BASE_URL
      # OTP_EXPIRY_MINUTES
      # OTP_LENGTH
